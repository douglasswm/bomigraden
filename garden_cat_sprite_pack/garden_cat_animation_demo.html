<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Garden Cat Sprite Demo</title>
  <style>
    :root {
      --sprite-w: 512px;
      --sprite-h: 512px;
      --sheet-w: 2048px;
      --sheet-h: 1024px;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      display: grid;
      place-items: center;
      background: #edf5df;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .garden-scene {
      position: relative;
      width: min(92vw, 900px);
      aspect-ratio: 1157 / 1120;
      overflow: visible;
      user-select: none;
    }

    .garden {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .cat {
      position: absolute;
      width: var(--sprite-w);
      height: var(--sprite-h);
      left: 50%;
      top: 55%;
      background-image: url("./calico_cat_garden_style_spritesheet_2048x1024.png");
      background-repeat: no-repeat;
      background-size: var(--sheet-w) var(--sheet-h);
      transform-origin: 50% 86%;
      image-rendering: auto;
      filter: drop-shadow(10px 18px 8px rgb(50 80 35 / 0.24));
      pointer-events: none;
    }

    .cat.idle {
      animation: catIdle 950ms steps(4) infinite;
    }

    .cat.walk {
      animation: catWalk 520ms steps(4) infinite;
    }

    @keyframes catIdle {
      from { background-position: 0 0; }
      to { background-position: -2048px 0; }
    }

    @keyframes catWalk {
      from { background-position: 0 -512px; }
      to { background-position: -2048px -512px; }
    }

    .hint {
      position: fixed;
      left: 16px;
      bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgb(255 255 255 / 0.75);
      color: #35551e;
      font-size: 14px;
      box-shadow: 0 4px 18px rgb(0 0 0 / 0.08);
    }
  </style>
</head>
<body>
  <main class="garden-scene" id="scene" aria-label="Garden scene with animated cat">
    <img class="garden" src="./annas-garden-island.png" alt="Garden island" />
    <div class="cat idle" id="cat" aria-hidden="true"></div>
  </main>
  <div class="hint">Click the garden to move the cat.</div>

  <script>
    const scene = document.getElementById('scene');
    const cat = document.getElementById('cat');

    const CAT_SCALE = 0.27;
    const ANCHOR_X = 0.5;
    const ANCHOR_Y = 0.86;

    let x = 0.50;
    let y = 0.56;
    let target = null;
    let last = performance.now();
    let direction = 1;

    function setCatState(state) {
      cat.classList.toggle('idle', state === 'idle');
      cat.classList.toggle('walk', state === 'walk');
    }

    function draw() {
      const sceneW = scene.clientWidth;
      const sceneH = scene.clientHeight;
      const flip = direction < 0 ? -1 : 1;

      cat.style.left = `${x * sceneW}px`;
      cat.style.top = `${y * sceneH}px`;
      cat.style.transform = `translate(${-ANCHOR_X * 512}px, ${-ANCHOR_Y * 512}px) scaleX(${flip}) scale(${CAT_SCALE})`;

      // Higher y should appear in front if you later add flowers/objects.
      cat.style.zIndex = String(Math.round(y * 1000));
    }

    function tick(now) {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;

      if (target) {
        const dx = target.x - x;
        const dy = target.y - y;
        const dist = Math.hypot(dx, dy);

        if (dist < 0.006) {
          x = target.x;
          y = target.y;
          target = null;
          setCatState('idle');
        } else {
          const speed = 0.15; // scene-relative units per second
          const step = Math.min(speed * dt, dist);
          x += (dx / dist) * step;
          y += (dy / dist) * step;
          direction = dx < 0 ? -1 : 1;
          setCatState('walk');
        }
      }

      draw();
      requestAnimationFrame(tick);
    }

    scene.addEventListener('click', (event) => {
      const rect = scene.getBoundingClientRect();
      const nextX = (event.clientX - rect.left) / rect.width;
      const nextY = (event.clientY - rect.top) / rect.height;

      // Rough bounds so the cat stays on the garden island.
      target = {
        x: Math.min(0.82, Math.max(0.15, nextX)),
        y: Math.min(0.78, Math.max(0.25, nextY))
      };
    });

    requestAnimationFrame(tick);
  </script>
</body>
</html>
